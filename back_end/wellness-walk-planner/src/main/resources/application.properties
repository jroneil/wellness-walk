spring.application.name=Wellness Window
server.port=9090
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:wellness;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
provider.credentials.master-key=${PROVIDER_CREDENTIAL_MASTER_KEY:}
calendar.oauth.frontend-success-url=${CALENDAR_OAUTH_FRONTEND_SUCCESS_URL:http://localhost:3000/calendar?oauth=success}
calendar.oauth.frontend-failure-url=${CALENDAR_OAUTH_FRONTEND_FAILURE_URL:http://localhost:3000/calendar?oauth=failure}
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
zip.lookup.base-url=https://api.zippopotam.us
zip.lookup.connection-timeout-ms=3000
zip.lookup.response-timeout-ms=5000
weather.nws.base-url=https://api.weather.gov
weather.nws.user-agent=Wellness Window, contact-email@example.com
weather.nws.connection-timeout-ms=5000
weather.nws.response-timeout-ms=10000
environment.open-meteo.forecast-base-url=https://api.open-meteo.com/v1/forecast
environment.open-meteo.air-quality-base-url=https://air-quality-api.open-meteo.com/v1/air-quality
environment.open-meteo.user-agent=Wellness Window
environment.open-meteo.connection-timeout-ms=3000
environment.open-meteo.response-timeout-ms=5000
recommendation.engine.candidate-interval-minutes=${RECOMMENDATION_CANDIDATE_INTERVAL_MINUTES:15}
recommendation.engine.default-walk-duration-minutes=${RECOMMENDATION_DEFAULT_WALK_DURATION_MINUTES:30}
recommendation.engine.minimum-score=${RECOMMENDATION_MINIMUM_SCORE:60}
recommendation.engine.weather-weight=${RECOMMENDATION_WEATHER_WEIGHT:72}
recommendation.engine.availability-weight=${RECOMMENDATION_AVAILABILITY_WEIGHT:20}
recommendation.engine.preference-weight=${RECOMMENDATION_PREFERENCE_WEIGHT:8}
walk.maximum-duration-minutes=${WALK_MAXIMUM_DURATION_MINUTES:480}
history.retention.cleanup-cron=${HISTORY_RETENTION_CLEANUP_CRON:0 17 3 * * *}
opportunity.expiry.cron=${OPPORTUNITY_EXPIRY_CRON:0 */15 * * * *}

calendar.caldav.enabled=${CALDAV_ENABLED:false}
calendar.caldav.server-url=${CALDAV_SERVER_URL:}
calendar.caldav.username=${CALDAV_USERNAME:}
calendar.caldav.password=${CALDAV_PASSWORD:}
calendar.caldav.calendar-path=${CALDAV_CALENDAR_PATH:}
calendar.caldav.calendar-ids=${CALDAV_CALENDAR_IDS:}
calendar.caldav.default-timezone=${CALDAV_DEFAULT_TIMEZONE:UTC}
calendar.caldav.lookahead-days=${CALDAV_LOOKAHEAD_DAYS:7}
calendar.caldav.maximum-occurrences-per-event=${CALDAV_MAX_OCCURRENCES_PER_EVENT:500}
calendar.caldav.maximum-events-per-calendar=${CALDAV_MAX_EVENTS_PER_CALENDAR:2000}
calendar.caldav.maximum-response-bytes=${CALDAV_MAX_RESPONSE_BYTES:2000000}
calendar.caldav.maximum-expansion-days=${CALDAV_MAX_EXPANSION_DAYS:31}
calendar.caldav.connection-timeout=${CALDAV_CONNECTION_TIMEOUT:3s}
calendar.caldav.read-timeout=${CALDAV_READ_TIMEOUT:5s}
calendar.google.enabled=${GOOGLE_CALENDAR_ENABLED:false}
calendar.google.client-id=${GOOGLE_CALENDAR_CLIENT_ID:}
calendar.google.client-secret=${GOOGLE_CALENDAR_CLIENT_SECRET:}
calendar.google.redirect-uri=${GOOGLE_CALENDAR_REDIRECT_URI:http://localhost:9090/api/calendar/providers/GOOGLE/oauth/callback}
calendar.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
calendar.google.token-uri=https://oauth2.googleapis.com/token
calendar.google.revocation-uri=https://oauth2.googleapis.com/revoke
calendar.google.api-base-url=https://www.googleapis.com/calendar/v3
calendar.google.connection-timeout=${GOOGLE_CALENDAR_CONNECTION_TIMEOUT:3s}
calendar.google.read-timeout=${GOOGLE_CALENDAR_READ_TIMEOUT:8s}
calendar.google.maximum-events-per-calendar=${GOOGLE_CALENDAR_MAX_EVENTS_PER_CALENDAR:2500}
