services:
  backend:
    build:
      context: ./back_end/wellness-walk-planner
    environment:
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      ZIP_LOOKUP_BASE_URL: https://api.zippopotam.us
      ZIP_LOOKUP_CONNECTION_TIMEOUT_MS: 3000
      ZIP_LOOKUP_RESPONSE_TIMEOUT_MS: 5000
      ENVIRONMENT_OPEN_METEO_FORECAST_BASE_URL: https://api.open-meteo.com/v1/forecast
      ENVIRONMENT_OPEN_METEO_AIR_QUALITY_BASE_URL: https://air-quality-api.open-meteo.com/v1/air-quality
      ENVIRONMENT_OPEN_METEO_CONNECTION_TIMEOUT_MS: 3000
      ENVIRONMENT_OPEN_METEO_RESPONSE_TIMEOUT_MS: 5000
    ports:
      - "9090:9090"

  frontend:
    build:
      context: ./front_end/wellness_walk_planner_ui
    environment:
      BACKEND_URL: http://backend:9090
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      - backend
